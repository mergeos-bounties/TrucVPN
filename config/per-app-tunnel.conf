[per_app_tunnel]
# List of apps that should use the VPN tunnel
apps = [
  { name = "chrome", path = "/usr/bin/google-chrome", tunnel = true },
  { name = "firefox", path = "/usr/bin/firefox", tunnel = true },
  { name = "telegram", path = "/usr/bin/telegram-desktop", tunnel = true },
  { name = "local-app", path = "/usr/bin/local-app", tunnel = false },
]
# Default behavior for unlisted apps
default_tunnel = false
